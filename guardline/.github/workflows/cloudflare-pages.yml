name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 99f04b37de1e8cd3aac9952b74276c44
          projectName: guardline-dashboard
          directory: guardline/frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
