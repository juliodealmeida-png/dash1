name: Deploy Frontend-v3 to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'guardline/frontend-v3/**'
      - 'guardline/wrangler.toml'
      - '.github/workflows/deploy-frontend-v3.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: guardline/frontend-v3/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: guardline/frontend-v3

      - name: Build
        run: npm run build
        working-directory: guardline/frontend-v3
        env:
          VITE_API_BASE: https://guardline-engine-production.up.railway.app/api

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy guardline/frontend-v3/dist --project-name=guardline-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}




