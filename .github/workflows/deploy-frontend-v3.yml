name: Deploy Frontend-v3 to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'guardline/frontend-v3/**'
      - 'guardline/wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: guardline/frontend-v3/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: guardline/frontend-v3

      - name: Build
        run: npm run build
        working-directory: guardline/frontend-v3
        env:
          VITE_API_URL: https://guardline-engine-production.up.railway.app/api

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy guardline/frontend-v3/dist --project-name=guardline-dashboard --commit-dirty=true
