<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julio AI — Chat Widget</title>
<style>
  /* ═══════════════════════════════════════════════
     RESET & BASE
     ═══════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8eaf0 0%, #d1d5e0 50%, #c8cdd8 100%);
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ═══════════════════════════════════════════════
     WIDGET CONTAINER
     ═══════════════════════════════════════════════ */
  .julio-widget {
    position: relative;
    width: 380px;
    border-radius: 24px;
    overflow: visible;
    box-shadow:
      0 32px 64px rgba(0, 0, 0, 0.35),
      0 8px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: widgetFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes widgetFadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ═══════════════════════════════════════════════
     CARD BODY — gradient background
     ═══════════════════════════════════════════════ */
  .julio-card {
    position: relative;
    background: linear-gradient(160deg, #1a1040 0%, #2d1b69 35%, #1e1145 70%, #140e30 100%);
    border-radius: 24px;
    padding: 40px 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  .julio-card::before {
    content: '';
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 60, 200, 0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════════
     CLOSE BUTTON
     ═══════════════════════════════════════════════ */
  .julio-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.5);
    font-size: 18px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 10;
    backdrop-filter: blur(8px);
    animation: fadeInSoft 0.8s 0.3s both;
  }
  .julio-close:hover {
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.8);
    border-color: rgba(255, 255, 255, 0.2);
    transform: rotate(90deg);
  }

  /* ═══════════════════════════════════════════════
     AVATAR CONTAINER — breathing + head tilt
     ═══════════════════════════════════════════════ */
  .julio-avatar-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 24px;
    animation: breathing 4s ease-in-out infinite, headTilt 10s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes breathing {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.005) translateY(-1px); }
  }
  @keyframes headTilt {
    0%, 100% { transform: rotate(0.5deg); }
    50%      { transform: rotate(-0.5deg); }
  }

  /* Circular glow behind avatar */
  .julio-avatar-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(80, 40, 160, 0.6) 0%, rgba(40, 20, 80, 0.3) 50%, transparent 75%);
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Avatar image */
  .julio-avatar-img {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
  }
  .julio-avatar-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* Blink overlay — simulates eyelid blink */
  .julio-blink-overlay {
    position: absolute;
    top: 35%;
    left: 20%;
    width: 60%;
    height: 8%;
    z-index: 3;
    display: flex;
    gap: 24%;
    pointer-events: none;
  }
  .julio-eyelid {
    flex: 1;
    background: transparent;
    border-radius: 50%;
    opacity: 0;
    animation: blink 5s ease-in-out infinite;
  }
  .julio-eyelid:nth-child(2) {
    animation-delay: 0.02s;
  }
  @keyframes blink {
    0%, 95%, 100% { opacity: 0; transform: scaleY(0); }
    97%           { opacity: 1; transform: scaleY(1); }
  }

  /* ═══════════════════════════════════════════════
     SVG AVATAR PLACEHOLDER (used when no image)
     ═══════════════════════════════════════════════ */
  .julio-svg-avatar {
    width: 100%;
    height: 100%;
  }

  /* ═══════════════════════════════════════════════
     SPEECH BUBBLE — pop-in + typing dots
     ═══════════════════════════════════════════════ */
  .julio-bubble {
    position: absolute;
    top: -10px;
    right: -40px;
    z-index: 20;
    animation: bubblePopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }
  @keyframes bubblePopIn {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .bubble-shape {
    position: relative;
    background: linear-gradient(135deg, rgba(180, 240, 230, 0.95) 0%, rgba(140, 210, 230, 0.9) 50%, rgba(160, 200, 240, 0.85) 100%);
    border-radius: 20px;
    padding: 16px 22px;
    backdrop-filter: blur(10px);
    box-shadow:
      0 8px 24px rgba(0, 0, 0, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .bubble-shape::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 20px;
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, rgba(160, 230, 220, 0.9), rgba(140, 210, 230, 0.85));
    border-radius: 0 0 12px 0;
    transform: rotate(35deg) skewX(-15deg);
  }

  /* Typing dots */
  .bubble-dots {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .bubble-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(40, 50, 70, 0.7);
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  .bubble-dot:nth-child(1) { animation-delay: 0s; }
  .bubble-dot:nth-child(2) { animation-delay: 0.2s; }
  .bubble-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.3; transform: scale(0.85); }
  }

  /* ═══════════════════════════════════════════════
     INPUT BAR
     ═══════════════════════════════════════════════ */
  .julio-input-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 6px 8px 6px 18px;
    backdrop-filter: blur(12px);
    animation: fadeInSoft 0.8s 0.4s both;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    z-index: 5;
  }
  .julio-input-bar:focus-within {
    border-color: rgba(100, 180, 220, 0.4);
    box-shadow: 0 0 0 3px rgba(100, 180, 220, 0.1);
  }

  .julio-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: rgba(255, 255, 255, 0.85);
    font-size: 15px;
    font-family: inherit;
    padding: 10px 0;
    letter-spacing: 0.01em;
  }
  .julio-input::placeholder {
    color: rgba(255, 255, 255, 0.35);
    font-weight: 400;
  }

  /* Send button */
  .julio-send-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, rgba(80, 200, 220, 0.2) 0%, rgba(100, 180, 240, 0.15) 100%);
    color: rgba(100, 210, 230, 0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }
  .julio-send-btn:hover {
    background: linear-gradient(135deg, rgba(80, 200, 220, 0.35), rgba(100, 180, 240, 0.3));
    color: rgba(140, 230, 245, 1);
    transform: scale(1.08);
  }
  .julio-send-btn:active {
    transform: scale(0.95);
  }
  .julio-send-btn.pulse {
    animation: sendPulse 0.4s ease;
  }
  @keyframes sendPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* Send icon (paper plane) SVG */
  .send-icon {
    width: 20px;
    height: 20px;
    transition: transform 0.25s ease;
  }
  .julio-send-btn:hover .send-icon {
    transform: translate(2px, -2px);
  }

  /* ═══════════════════════════════════════════════
     FADE-IN UTILITY
     ═══════════════════════════════════════════════ */
  @keyframes fadeInSoft {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ═══════════════════════════════════════════════
     RESPONSE BUBBLE (appears after send)
     ═══════════════════════════════════════════════ */
  .julio-response {
    width: 100%;
    margin-top: 16px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 5;
    position: relative;
  }
  .julio-response.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .julio-response-inner {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 14px 18px;
    color: rgba(255, 255, 255, 0.8);
    font-size: 13.5px;
    line-height: 1.6;
    backdrop-filter: blur(8px);
  }
  .julio-response-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(100, 210, 230, 0.7);
    margin-bottom: 8px;
  }

  /* ═══════════════════════════════════════════════
     SMILE ANIMATION (avatar reacts on send)
     ═══════════════════════════════════════════════ */
  .julio-avatar-wrap.reacting {
    animation: avatarReact 0.6s ease;
  }
  @keyframes avatarReact {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03) translateY(-2px); }
    60%  { transform: scale(1.01); }
    100% { transform: scale(1) translateY(0); }
  }

  /* Bubble exit */
  .julio-bubble.exit {
    animation: bubbleExit 0.3s ease-in forwards;
  }
  @keyframes bubbleExit {
    from { transform: scale(1); opacity: 1; }
    to   { transform: scale(0.7); opacity: 0; }
  }

  /* ═══════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════ */
  @media (max-width: 440px) {
    .julio-widget { width: 92vw; }
    .julio-card { padding: 32px 20px 20px; }
    .julio-avatar-wrap { width: 180px; height: 180px; }
    .julio-bubble { right: -20px; top: -5px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     JULIO CHAT WIDGET
     ═══════════════════════════════════════════════ -->
<div class="julio-widget" id="julioWidget">
  <div class="julio-card">

    <!-- Close button -->
    <button class="julio-close" id="julioClose" title="Cerrar">✕</button>

    <!-- Avatar with animations -->
    <div class="julio-avatar-wrap" id="julioAvatar">
      <div class="julio-avatar-glow"></div>
      <div class="julio-avatar-img">
        <!-- SVG placeholder avatar — replace src with actual Julio 3D render -->
        <svg class="julio-svg-avatar" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Background circle -->
          <defs>
            <radialGradient id="skinGrad" cx="50%" cy="40%" r="50%">
              <stop offset="0%" stop-color="#f0c8a0"/>
              <stop offset="100%" stop-color="#d4a574"/>
            </radialGradient>
            <radialGradient id="shirtGrad" cx="50%" cy="30%" r="60%">
              <stop offset="0%" stop-color="#5a5a6e"/>
              <stop offset="100%" stop-color="#3d3d50"/>
            </radialGradient>
            <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#3a2a1a"/>
              <stop offset="100%" stop-color="#2a1c10"/>
            </linearGradient>
          </defs>

          <!-- Shirt / Torso -->
          <ellipse cx="110" cy="210" rx="80" ry="50" fill="url(#shirtGrad)"/>
          <line x1="110" y1="165" x2="110" y2="195" stroke="#4a4a5e" stroke-width="1.5" opacity="0.5"/>
          <circle cx="110" cy="175" r="2" fill="#4a4a5e" opacity="0.4"/>
          <circle cx="110" cy="185" r="2" fill="#4a4a5e" opacity="0.4"/>

          <!-- Neck -->
          <rect x="98" y="148" width="24" height="22" rx="10" fill="url(#skinGrad)"/>

          <!-- Head -->
          <ellipse cx="110" cy="105" rx="52" ry="56" fill="url(#skinGrad)"/>

          <!-- Hair -->
          <ellipse cx="110" cy="68" rx="54" ry="40" fill="url(#hairGrad)"/>
          <path d="M56,90 Q58,60 80,50 Q100,42 130,48 Q155,55 162,85" fill="url(#hairGrad)"/>

          <!-- Eyebrows -->
          <path d="M80,88 Q90,82 100,86" stroke="#2a1c10" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M120,86 Q130,82 140,88" stroke="#2a1c10" stroke-width="3" fill="none" stroke-linecap="round"/>

          <!-- Eyes -->
          <ellipse cx="92" cy="100" rx="8" ry="7" fill="white"/>
          <ellipse cx="128" cy="100" rx="8" ry="7" fill="white"/>
          <circle cx="93" cy="100" r="4.5" fill="#4a3520"/>
          <circle cx="129" cy="100" r="4.5" fill="#4a3520"/>
          <circle cx="94" cy="98" r="1.8" fill="white"/>
          <circle cx="130" cy="98" r="1.8" fill="white"/>

          <!-- Eyelids (for blink) -->
          <ellipse class="eyelid-svg" cx="92" cy="100" rx="9" ry="8" fill="url(#skinGrad)" opacity="0"/>
          <ellipse class="eyelid-svg" cx="128" cy="100" rx="9" ry="8" fill="url(#skinGrad)" opacity="0"/>

          <!-- Nose -->
          <path d="M107,112 Q110,118 113,112" stroke="#c4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

          <!-- Mouth (smile) -->
          <path class="julio-mouth" d="M92,128 Q100,140 110,140 Q120,140 128,128" stroke="#b87a5a" stroke-width="2" fill="none" stroke-linecap="round"/>

          <!-- Beard -->
          <path d="M78,120 Q80,150 110,155 Q140,150 142,120" fill="url(#hairGrad)" opacity="0.7"/>
          <path d="M85,128 Q95,142 110,145 Q125,142 135,128" fill="url(#hairGrad)" opacity="0.5"/>

          <!-- Ears -->
          <ellipse cx="58" cy="105" rx="8" ry="12" fill="url(#skinGrad)"/>
          <ellipse cx="162" cy="105" rx="8" ry="12" fill="url(#skinGrad)"/>
        </svg>
      </div>

      <!-- Blink overlay (transparent when not blinking) -->
      <div class="julio-blink-overlay">
        <div class="julio-eyelid"></div>
        <div class="julio-eyelid"></div>
      </div>

      <!-- Speech bubble with typing dots -->
      <div class="julio-bubble" id="julioBubble">
        <div class="bubble-shape">
          <div class="bubble-dots">
            <div class="bubble-dot"></div>
            <div class="bubble-dot"></div>
            <div class="bubble-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="julio-input-bar" id="julioInputBar">
      <input
        type="text"
        class="julio-input"
        id="julioInput"
        placeholder="Preguntar a Julio"
        autocomplete="off"
      />
      <button class="julio-send-btn" id="julioSendBtn" title="Enviar">
        <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- Response area (hidden initially) -->
    <div class="julio-response" id="julioResponse">
      <div class="julio-response-inner">
        <div class="julio-response-label">Julio AI</div>
        <div id="julioResponseText"></div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════
     ANIMATION LOGIC
     ═══════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // ── DOM refs ──
  var widget     = document.getElementById('julioWidget');
  var avatar     = document.getElementById('julioAvatar');
  var bubble     = document.getElementById('julioBubble');
  var input      = document.getElementById('julioInput');
  var sendBtn    = document.getElementById('julioSendBtn');
  var closeBtn   = document.getElementById('julioClose');
  var response   = document.getElementById('julioResponse');
  var respText   = document.getElementById('julioResponseText');

  // ── SVG eyelid blink (programmatic for more natural timing) ──
  var eyelids = document.querySelectorAll('.eyelid-svg');
  var mouthPath = document.querySelector('.julio-mouth');

  function triggerBlink() {
    eyelids.forEach(function(lid) {
      lid.style.transition = 'opacity 0.075s ease-in';
      lid.style.opacity = '1';
    });
    setTimeout(function() {
      eyelids.forEach(function(lid) {
        lid.style.transition = 'opacity 0.075s ease-out';
        lid.style.opacity = '0';
      });
    }, 150);
  }

  // Natural blink: every 3-6 seconds with occasional double-blink
  function scheduleBlink() {
    var delay = 3000 + Math.random() * 3000;
    setTimeout(function() {
      triggerBlink();
      // 20% chance of double blink
      if (Math.random() < 0.2) {
        setTimeout(triggerBlink, 300);
      }
      scheduleBlink();
    }, delay);
  }
  scheduleBlink();

  // ── Smile animation on send ──
  function triggerSmile() {
    if (!mouthPath) return;
    var original = mouthPath.getAttribute('d');
    // Wider smile
    mouthPath.setAttribute('d', 'M88,128 Q98,145 110,146 Q122,145 132,128');
    setTimeout(function() {
      mouthPath.setAttribute('d', original);
    }, 800);
  }

  // ── Avatar reaction ──
  function triggerAvatarReact() {
    avatar.classList.remove('reacting');
    // Force reflow
    void avatar.offsetWidth;
    avatar.classList.add('reacting');
    triggerSmile();
    setTimeout(function() {
      avatar.classList.remove('reacting');
    }, 600);
  }

  // ── Bubble exit & re-enter ──
  function hideBubble() {
    bubble.classList.add('exit');
    return new Promise(function(resolve) {
      setTimeout(resolve, 300);
    });
  }
  function showBubble() {
    bubble.classList.remove('exit');
    bubble.style.animation = 'none';
    void bubble.offsetWidth;
    bubble.style.animation = 'bubblePopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both';
  }

  // ── Send button pulse ──
  function pulseSend() {
    sendBtn.classList.remove('pulse');
    void sendBtn.offsetWidth;
    sendBtn.classList.add('pulse');
    setTimeout(function() { sendBtn.classList.remove('pulse'); }, 400);
  }

  // ── Demo responses ──
  var demoResponses = [
    '¡Hola! Soy Julio, tu asistente de ventas inteligente. Puedo ayudarte a analizar deals, evaluar riesgos del pipeline y sugerir próximas acciones. ¿En qué puedo ayudarte hoy?',
    'He analizado tu pipeline: tienes <strong>3 deals en riesgo crítico</strong> que necesitan atención inmediata. ¿Quieres ver el desglose completo?',
    'La tasa de conversión de tu pipeline mejoró un <strong>12% este mes</strong>. Los deals en la etapa de negociación son los que más contribuyen. 🎯',
    'Basado en el MEDDPICC, te recomiendo priorizar <strong>Empresa Alfa</strong> — su score bajó a 35% y el Economic Buyer no está identificado.',
    'El forecast para los próximos 90 días muestra un committed de <strong>$142k</strong>, pero hay riesgo de slippage en 2 deals. ¿Quieres que detalle las acciones?',
  ];
  var responseIndex = 0;

  // ── Handle send ──
  function handleSend() {
    var text = input.value.trim();
    if (!text) return;

    // 1. Pulse send button
    pulseSend();

    // 2. Avatar reacts
    triggerAvatarReact();

    // 3. Hide bubble, then show response
    hideBubble().then(function() {
      // Clear input
      input.value = '';

      // Show response
      var resp = demoResponses[responseIndex % demoResponses.length];
      responseIndex++;
      respText.innerHTML = resp;
      response.classList.add('visible');

      // Bring bubble back after a delay
      setTimeout(function() {
        showBubble();
      }, 2500);
    });
  }

  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSend();
  });

  // ── Close button ──
  closeBtn.addEventListener('click', function() {
    widget.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    widget.style.opacity = '0';
    widget.style.transform = 'scale(0.9) translateY(20px)';
    setTimeout(function() {
      widget.style.display = 'none';
      // Re-show after 2s for demo
      setTimeout(function() {
        widget.style.display = '';
        widget.style.opacity = '';
        widget.style.transform = '';
        widget.style.transition = '';
        widget.style.animation = 'widgetFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both';
        response.classList.remove('visible');
        showBubble();
      }, 2000);
    }, 300);
  });

})();
</script>
